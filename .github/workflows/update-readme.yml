name: Update Codeforces Stats

on:
  schedule:
    # Runs once a day at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch: {}   # allows manual "Run workflow" trigger from the Actions tab
  push:
    branches: [main]
    paths:
      - "README.md"        # re-run if README structure/markers change

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run updater script
        env:
          CF_HANDLE: Peter8299
        run: python3 scripts/update_readme.py

      - name: Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md assets/heatmap.svg
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-update Codeforces stats [skip ci]"
            git push
          fi
